<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <meta name="theme-color" content="#0b63ce" />
  <title>ポスナビ v0.3</title>
  <link rel="preconnect" href="https://unpkg.com" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    :root{--blue:#0b63ce;--green:#20a647;--red:#e43b3b;--yellow:#f2b51d;--purple:#7a49d6;--gray:#7c8794;}
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;background:#f4f6f8;color:#15202b}
    body{overflow:hidden}
    #app{height:100%;display:flex;flex-direction:column}
    header{height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:#fff;border-bottom:1px solid #dfe5eb;z-index:1000}
    header h1{font-size:22px;margin:0;color:var(--blue);letter-spacing:.03em}
    .icon-btn{border:0;background:#eef5ff;color:var(--blue);width:42px;height:42px;border-radius:14px;font-size:21px;display:grid;place-items:center}
    #map{flex:1;min-height:0}
    .leaflet-control-zoom{display:none}
    .legend{position:absolute;left:12px;top:72px;z-index:800;background:rgba(255,255,255,.95);border-radius:14px;padding:10px 12px;box-shadow:0 6px 22px rgba(0,0,0,.15);font-size:12px;line-height:1.9}
    .legend span{display:inline-block;width:13px;height:13px;border-radius:4px;margin-right:7px;vertical-align:-2px}
    .floating{position:absolute;right:12px;bottom:128px;z-index:800;display:flex;flex-direction:column;gap:10px}
    .fab{border:0;background:#fff;width:54px;height:54px;border-radius:50%;box-shadow:0 4px 16px rgba(0,0,0,.22);font-size:24px;color:var(--blue)}
    .stats{height:86px;background:#fff;border-top:1px solid #dfe5eb;display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;z-index:900}
    .stat{display:flex;flex-direction:column;justify-content:center;align-items:center;background:#fff}
    .stat small{color:#687684;font-size:12px}
    .stat strong{font-size:24px;margin-top:4px}.stat strong.blue{color:var(--blue)}.stat strong.green{color:var(--green)}
    .marker-wrap{position:relative;width:34px;height:38px;display:grid;place-items:center;transform:translate(-1px,-2px)}
    .marker-house{width:31px;height:31px;border-radius:9px 9px 7px 7px;background:#c7ced6;border:3px solid white;box-shadow:0 2px 7px rgba(0,0,0,.3);display:grid;place-items:center;color:#fff;font-weight:800;font-size:16px}
    .close-zoom .marker-wrap{transform:translate(-1px,-2px) scale(1.18)}
    .close-zoom .marker-house{box-shadow:0 3px 12px rgba(0,0,0,.45)}
    .marker-house.green{background:var(--green)}.marker-house.blue{background:var(--blue)}.marker-house.red{background:var(--red)}.marker-house.yellow{background:var(--yellow)}.marker-house.purple{background:var(--purple)}
    .badge{position:absolute;right:-5px;top:-7px;min-width:20px;height:20px;padding:0 5px;border-radius:10px;background:#fff;border:2px solid currentColor;display:grid;place-items:center;font-size:11px;font-weight:800}
    .sheet-backdrop{position:fixed;inset:0;background:rgba(15,25,35,.35);z-index:2000;display:none}
    .sheet{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:22px 22px 0 0;z-index:2100;padding:16px;transform:translateY(105%);transition:.22s ease;max-height:84vh;overflow:auto}
    .sheet.open{transform:translateY(0)}.sheet-backdrop.open{display:block}
    .sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.sheet-head h2{margin:0;font-size:18px}.close{border:0;background:#eef1f4;width:38px;height:38px;border-radius:12px;font-size:20px}
    .count-row{display:grid;grid-template-columns:58px 1fr 58px;gap:10px;align-items:center;margin:12px 0 12px}.count-row button{height:50px;border:0;border-radius:14px;background:#eef5ff;color:var(--blue);font-size:28px}.count-display{height:50px;background:#f3f5f7;border-radius:14px;display:grid;place-items:center;font-size:25px;font-weight:800}
    .previous-card{background:#f7f9fb;border:1px solid #e2e8ef;border-radius:14px;padding:11px 13px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}.previous-card small{color:#687684}.previous-card strong{font-size:18px;color:var(--blue)}
    .history{margin-top:14px;border-top:1px solid #e4e9ef;padding-top:12px}.history h3{font-size:15px;margin:0 0 8px}.history-list{display:grid;gap:7px}.history-item{display:flex;justify-content:space-between;background:#f7f9fb;border-radius:10px;padding:9px 11px;font-size:14px}.history-empty{color:#7c8794;font-size:13px;padding:4px 0}
    .chips{display:flex;flex-wrap:wrap;gap:8px}.chip{border:1px solid #d8e0e8;background:#fff;border-radius:999px;padding:10px 12px;font-weight:700}.chip.active{outline:2px solid currentColor;background:#f7fbff}.chip.red{color:var(--red)}.chip.yellow{color:#b47a00}.chip.purple{color:var(--purple)}.chip.blue{color:var(--blue)}
    textarea{width:100%;min-height:88px;border:1px solid #d8e0e8;border-radius:14px;padding:12px;font-size:16px;resize:vertical;margin-top:12px}
    .sheet-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.sheet-actions button{height:50px;border:0;border-radius:14px;font-size:16px;font-weight:800}.save{background:var(--blue);color:#fff}.delete{background:#ffecec;color:var(--red)}
    .toast{position:fixed;left:50%;bottom:102px;transform:translateX(-50%) translateY(20px);background:#1e2a35;color:#fff;padding:10px 14px;border-radius:999px;z-index:3000;opacity:0;transition:.18s;pointer-events:none;font-size:14px}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .hint{position:absolute;left:50%;top:72px;transform:translateX(-50%);z-index:790;background:rgba(11,99,206,.92);color:#fff;padding:8px 12px;border-radius:999px;font-size:12px;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.18)}
  </style>
</head>
<body>
<div id="app">
  <header>
    <button class="icon-btn" id="resetBtn" aria-label="リセット">↺</button>
    <h1>ポスナビ</h1>
    <button class="icon-btn" id="locateBtn" aria-label="現在地">◎</button>
  </header>
  <div id="map"></div>
  <div class="hint">地図をタップして物件登録・物件をタップして部数追加</div>
  <div class="legend">
    <div><span style="background:#c7ced6"></span>未配布</div>
    <div><span style="background:#20a647"></span>1部</div>
    <div><span style="background:#0b63ce"></span>2部以上</div>
    <div><span style="background:#e43b3b"></span>入れない</div>
    <div><span style="background:#f2b51d"></span>要注意</div>
    <div><span style="background:#7a49d6"></span>会社・配布可</div>
  </div>
  <div class="floating"><button class="fab" id="detailsBtn" title="選択中の詳細">⋯</button></div>
  <div class="stats">
    <div class="stat"><small>今日の配布数</small><strong class="blue" id="todayCount">0部</strong></div>
    <div class="stat"><small>配布済み</small><strong class="green" id="doneCount">0件</strong></div>
    <div class="stat"><small>登録物件</small><strong id="propertyCount">0件</strong></div>
  </div>
</div>
<div class="sheet-backdrop" id="backdrop"></div>
<section class="sheet" id="sheet" aria-modal="true">
  <div class="sheet-head"><h2>物件詳細</h2><button class="close" id="closeSheet">×</button></div>
  <div class="count-row"><button id="minusBtn">−</button><div class="count-display"><span id="detailCount">0</span>部</div><button id="plusBtn">＋</button></div>
  <div class="previous-card"><small>前回の配布</small><strong id="previousCount">履歴なし</strong></div>
  <div class="chips">
    <button class="chip blue" data-flag="twoFamily">2世帯</button>
    <button class="chip red" data-flag="noPost">入れない</button>
    <button class="chip purple" data-flag="companyOk">会社・配布可</button>
    <button class="chip yellow" data-flag="caution">要注意</button>
  </div>
  <textarea id="memo" placeholder="メモ（例：玄関横にポスト2つ）"></textarea>
  <div class="history"><h3>配布履歴</h3><div class="history-list" id="historyList"></div></div>
  <div class="sheet-actions"><button class="delete" id="deleteBtn">削除</button><button class="save" id="saveBtn">保存</button></div>
</section>
<div class="toast" id="toast"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
const STORAGE='posnavi-v01';
const initialCenter=[43.0621,141.3544];
const map=L.map('map',{zoomControl:false}).setView(initialCenter,17);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxNativeZoom:19,maxZoom:22,attribution:'&copy; OpenStreetMap contributors'}).addTo(map);
const todayKey=()=>new Date().toLocaleDateString('sv-SE');
const yesterdayKey=()=>{const d=new Date();d.setDate(d.getDate()-1);return d.toLocaleDateString('sv-SE');};
const formatDate=d=>{const [y,m,day]=d.split('-');return `${Number(m)}/${Number(day)}`;};
let data=JSON.parse(localStorage.getItem(STORAGE)||'[]');
let selectedId=null, markers=new Map();

// v0.2以前のデータを履歴形式へ移行。以前の部数は「前回」として残す。
data=data.map(p=>{
  if(!Array.isArray(p.history)){
    const oldCount=Number(p.count)||0;
    p.history=oldCount>0?[{date:yesterdayKey(),count:oldCount}]:[];
    p.count=0;
  }
  p.flags=p.flags||{};
  p.memo=p.memo||'';
  return p;
});
localStorage.setItem(STORAGE,JSON.stringify(data));

function todayEntry(p){return p.history?.find(h=>h.date===todayKey());}
function todayCount(p){return Number(todayEntry(p)?.count)||0;}
function previousEntry(p){
  return [...(p.history||[])]
    .filter(h=>h.date<todayKey() && Number(h.count)>0)
    .sort((a,b)=>b.date.localeCompare(a.date))[0]||null;
}
function setTodayCount(p,count){
  p.history=p.history||[];
  const n=Math.max(0,Number(count)||0);
  const existing=todayEntry(p);
  if(existing) existing.count=n;
  else p.history.push({date:todayKey(),count:n});
  p.history=p.history.filter(h=>Number(h.count)>0).sort((a,b)=>b.date.localeCompare(a.date));
  p.count=n;
}
function save(){localStorage.setItem(STORAGE,JSON.stringify(data));updateStats();}
function displayCount(p){return todayCount(p)||previousEntry(p)?.count||0;}
function iconFor(p){
  const current=todayCount(p), previous=previousEntry(p);
  let cls='';
  if(p.flags?.noPost)cls='red';
  else if(p.flags?.caution)cls='yellow';
  else if(p.flags?.companyOk)cls='purple';
  else if(current>=2)cls='blue';
  else if(current===1)cls='green';
  const shown=current||previous?.count||0;
  const isPrevious=!current&&previous;
  const color=cls==='green'?'#20a647':cls==='blue'?'#0b63ce':cls==='red'?'#e43b3b':cls==='yellow'?'#b47a00':cls==='purple'?'#7a49d6':'#7c8794';
  const badge=shown>0?`<div class="badge" style="color:${color}">${isPrevious?'↺':''}${shown}</div>`:'';
  return L.divIcon({className:'',html:`<div class="marker-wrap"><div class="marker-house ${cls}">⌂</div>${badge}</div>`,iconSize:[34,38],iconAnchor:[17,30]});
}
function registerTap(p){
  const current=todayCount(p);
  if(current>0) setTodayCount(p,current+1);
  else setTodayCount(p,previousEntry(p)?.count||1);
}
function render(){
  markers.forEach(m=>m.remove());markers.clear();
  for(const p of data){
    const m=L.marker([p.lat,p.lng],{icon:iconFor(p)}).addTo(map);
    m.on('click',e=>{L.DomEvent.stopPropagation(e);selectedId=p.id;registerTap(p);save();m.setIcon(iconFor(p));toast(`${todayCount(p)}部に更新`);});
    m.on('contextmenu',e=>{L.DomEvent.stopPropagation(e);selectedId=p.id;openSheet();});
    m.on('dblclick',e=>{L.DomEvent.stopPropagation(e);selectedId=p.id;openSheet();});
    markers.set(p.id,m);
  }
  updateStats();
}
map.on('click',e=>{
  const p={id:crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random()),lat:e.latlng.lat,lng:e.latlng.lng,count:1,history:[{date:todayKey(),count:1}],flags:{},memo:''};
  data.push(p);selectedId=p.id;save();render();toast('1部で登録しました');
});
function selected(){return data.find(x=>x.id===selectedId)}
function renderHistory(p){
  const list=document.getElementById('historyList');
  const rows=[...(p.history||[])].filter(h=>Number(h.count)>0).sort((a,b)=>b.date.localeCompare(a.date));
  list.innerHTML=rows.length?rows.map(h=>`<div class="history-item"><span>${h.date===todayKey()?'今回（今日）':formatDate(h.date)}</span><strong>${h.count}部</strong></div>`).join(''):'<div class="history-empty">まだ履歴はありません</div>';
}
function openSheet(){
  const p=selected();if(!p){toast('物件を選択してください');return;}
  document.getElementById('detailCount').textContent=todayCount(p);
  const prev=previousEntry(p);
  document.getElementById('previousCount').textContent=prev?`${prev.count}部・${formatDate(prev.date)}`:'履歴なし';
  document.getElementById('memo').value=p.memo||'';
  document.querySelectorAll('.chip').forEach(b=>b.classList.toggle('active',!!p.flags?.[b.dataset.flag]));
  renderHistory(p);
  document.getElementById('sheet').classList.add('open');document.getElementById('backdrop').classList.add('open');
}
function closeSheet(){document.getElementById('sheet').classList.remove('open');document.getElementById('backdrop').classList.remove('open');}
document.getElementById('detailsBtn').onclick=openSheet;document.getElementById('closeSheet').onclick=closeSheet;document.getElementById('backdrop').onclick=closeSheet;
document.getElementById('plusBtn').onclick=()=>{const p=selected();if(!p)return;setTodayCount(p,todayCount(p)+1);document.getElementById('detailCount').textContent=todayCount(p);renderHistory(p);};
document.getElementById('minusBtn').onclick=()=>{const p=selected();if(!p)return;setTodayCount(p,Math.max(0,todayCount(p)-1));document.getElementById('detailCount').textContent=todayCount(p);renderHistory(p);};
document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{const p=selected();if(!p)return;p.flags=p.flags||{};p.flags[b.dataset.flag]=!p.flags[b.dataset.flag];b.classList.toggle('active',p.flags[b.dataset.flag]);if(b.dataset.flag==='twoFamily'&&p.flags.twoFamily&&todayCount(p)<2){setTodayCount(p,2);document.getElementById('detailCount').textContent=2;renderHistory(p);}});
document.getElementById('saveBtn').onclick=()=>{const p=selected();if(!p)return;p.memo=document.getElementById('memo').value.trim();save();render();closeSheet();toast('保存しました');};
document.getElementById('deleteBtn').onclick=()=>{
  const id=selectedId;if(!id||!selected()){toast('削除する物件がありません');return;}
  if(!confirm('この物件を削除しますか？'))return;
  closeSheet();const marker=markers.get(id);if(marker){map.removeLayer(marker);markers.delete(id);}
  data=data.filter(x=>x.id!==id);selectedId=null;save();render();toast('削除しました');
};
document.getElementById('resetBtn').onclick=()=>{if(confirm('登録した物件をすべて消しますか？')){data=[];selectedId=null;save();render();}};
document.getElementById('locateBtn').onclick=()=>{if(!navigator.geolocation){toast('現在地を取得できません');return;}navigator.geolocation.getCurrentPosition(pos=>{const ll=[pos.coords.latitude,pos.coords.longitude];map.setView(ll,19);L.circleMarker(ll,{radius:9,color:'#fff',weight:3,fillColor:'#0b63ce',fillOpacity:1}).addTo(map);toast('現在地を表示しました');},()=>toast('位置情報を許可してください'),{enableHighAccuracy:true,timeout:10000});};
function updateStats(){
  const total=data.reduce((s,p)=>s+todayCount(p),0);
  const done=data.filter(p=>todayCount(p)>0&&!p.flags?.noPost).length;
  document.getElementById('todayCount').textContent=total+'部';
  document.getElementById('doneCount').textContent=done+'件';
  document.getElementById('propertyCount').textContent=data.length+'件';
}
let toastTimer;function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),1500);}
map.on('zoomend',()=>{document.body.classList.toggle('close-zoom',map.getZoom()>=19);});
render();
</script>
</body>
</html>
