<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ポスナビ v0.5</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>ポスナビ</h1>
      <p id="sessionStatus">配布は開始されていません</p>
    </div>
    <button id="sessionButton" class="primary">配布開始</button>
  </header>

  <section class="search-bar">
    <input id="searchInput" type="search" placeholder="住所・建物名・メモを検索" />
    <button id="searchButton">検索</button>
  </section>

  <main>
    <div id="map"></div>

    <nav class="bottom-nav">
      <button data-panel="registerPanel">住宅登録</button>
      <button data-panel="masterPanel">住宅マスター</button>
      <button data-panel="historyPanel">配布履歴</button>
    </nav>
  </main>

  <section id="registerPanel" class="panel" hidden>
    <div class="panel-header">
      <h2>住宅登録</h2>
      <button class="close-panel">閉じる</button>
    </div>
    <form id="houseForm">
      <input type="hidden" id="houseId" />

      <label>住所・建物名
        <input id="houseAddress" required placeholder="例：札幌市豊平区福住1条1丁目" />
      </label>

      <div class="two-columns">
        <label>緯度
          <input id="houseLat" type="number" step="any" required />
        </label>
        <label>経度
          <input id="houseLng" type="number" step="any" required />
        </label>
      </div>

      <label>基本の配布部数
        <input id="defaultCopies" type="number" min="0" value="1" required />
      </label>

      <label>区分
        <select id="houseType">
          <option value="house">戸建て</option>
          <option value="apartment">集合住宅</option>
          <option value="company">会社・店舗</option>
          <option value="other">その他</option>
        </select>
      </label>

      <label>状態
        <select id="houseStatus">
          <option value="normal">通常</option>
          <option value="no-posting">配布不可</option>
          <option value="caution">要注意</option>
          <option value="multi">複数部予定</option>
        </select>
      </label>

      <label>メモ
        <textarea id="houseMemo" rows="3" placeholder="例：チラシお断り、会社受付に3部、前回20部など"></textarea>
      </label>

      <div class="form-actions">
        <button type="button" id="useMapCenter">地図中央を使う</button>
        <button type="submit" class="primary">保存</button>
      </div>
      <button type="button" id="deleteHouse" class="danger" hidden>この住宅を削除</button>
    </form>
  </section>

  <section id="masterPanel" class="panel" hidden>
    <div class="panel-header">
      <h2>住宅マスター</h2>
      <button class="close-panel">閉じる</button>
    </div>
    <div id="masterList" class="list"></div>
  </section>

  <section id="historyPanel" class="panel" hidden>
    <div class="panel-header">
      <h2>配布履歴</h2>
      <button class="close-panel">閉じる</button>
    </div>
    <div class="filters">
      <input id="historyDate" type="date" />
      <input id="historyArea" placeholder="エリアで絞り込み" />
      <button id="clearHistoryFilter">解除</button>
    </div>
    <div id="historyList" class="list"></div>
  </section>

  <dialog id="sessionDialog">
    <form method="dialog" id="sessionForm">
      <h2>配布開始</h2>
      <label>配布物
        <input id="sessionFlyer" placeholder="例：満腹米チラシ" />
      </label>
      <div class="dialog-actions">
        <button value="cancel">キャンセル</button>
        <button id="startSessionConfirm" value="default" class="primary">開始する</button>
      </div>
    </form>
  </dialog>

  <div id="toast" aria-live="polite"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
