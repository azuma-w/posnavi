<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>ポスナビ v0.7</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header>
    <button class="icon-btn" id="clearCurrentBtn" aria-label="今回の配布を全部消す">↺</button>
    <div class="title-wrap"><h1>ポスナビ</h1><small id="sessionStatus">待機中</small></div>
    <button class="session-btn" id="sessionBtn">配布開始</button>
  </header>

  <main id="mapWrap">
    <div id="map"></div>
    <div id="modeBanner" class="mode-banner" hidden></div>
    <div class="floating left">
      <button class="fab" id="searchFab" aria-label="住所検索">⌕</button>
      <button class="fab" id="locateFab" aria-label="現在地">◎</button>
    </div>
    <div class="floating right">
      <button class="fab menu-fab" id="moreFab" aria-label="詳細・メニュー">…</button>
    </div>
  </main>

  <footer class="stats">
    <div class="stat"><small>今日の配布数</small><strong id="todayCount">0部</strong></div>
    <div class="stat"><small>配布済み</small><strong id="doneCount">0件</strong></div>
    <div class="stat"><small>登録物件</small><strong id="houseCount">0件</strong></div>
  </footer>
</div>

<div class="backdrop" id="backdrop" hidden></div>
<section class="sheet" id="sheet" aria-modal="true" hidden>
  <div class="sheet-head"><h2 id="sheetTitle">メニュー</h2><button class="close" id="closeSheet">×</button></div>
  <div class="sheet-body" id="sheetBody"></div>
</section>

<div class="toast" id="toast" hidden><span id="toastText"></span><button id="undoBtn" hidden>取り消す</button></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
